<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPS Result Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .notice-board {
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid #2c3e50;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .marquee-container {
            height: 200px; /* Is height ko aap badha ya ghata sakte hain */
            padding: 10px 20px;
        }

        .result-link {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            background: #eef2f7;
            color: #1a73e8;
            text-decoration: none;
            border-radius: 6px;
            border-left: 5px solid #1a73e8;
            font-weight: 500;
            transition: 0.3s;
        }

        .result-link:hover {
            background: #1a73e8;
            color: white;
            transform: translateX(5px);
        }

        .new-tag {
            background: red;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="notice-board">
        <div class="header">Latest Updates / Results</div>
        
        <div class="marquee-container">
            <marquee direction="up" scrollamount="3" onmouseover="this.stop();" onmouseout="this.start();">
                
                <a href="https://sagarpublicschool.github.io/result_sps/" target="_blank" class="result-link">
                    <span class="new-tag">NEW</span> Click here to view the result of Class 1 to 10
                </a>

                <a href="http://google.com/" target="_blank" class="result-link">
                    <span class="new-tag">NEW</span> Click here to view the result of Nursery to UKG
                </a>

                <a href="http://youtube.com/" target="_blank" class="result-link">
                    <span class="new-tag">NEW</span> Click here to view the result of Play School
                </a>

            </marquee>
        </div>
    </div>

</body>
</html>
